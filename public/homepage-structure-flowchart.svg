  </text>

  <line x1="600" y1="412" x2="600" y2="452" stroke="#94A3B8" stroke-width="3"/>
  <polygon points="600,462 592,448 608,448" fill="#94A3B8"/>

  <rect x="330" y="462" width="540" height="72" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>

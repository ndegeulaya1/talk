  </text>

  <line x1="600" y1="158" x2="600" y2="198" stroke="#94A3B8" stroke-width="3"/>
  <polygon points="600,208 592,194 608,194" fill="#94A3B8"/>

  <rect x="360" y="208" width="480" height="72" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="600" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#0F172A">

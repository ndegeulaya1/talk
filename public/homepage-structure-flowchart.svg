  <rect x="900" y="206" width="250" height="204" rx="14" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2"/>
  <text x="1025" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9A3412">

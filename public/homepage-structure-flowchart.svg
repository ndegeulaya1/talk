  </text>

  <rect x="450" y="90" width="300" height="68" rx="14" fill="#0F172A"/>
  <text x="600" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">
